<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高考志愿院校专业分数线查询系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">招生信息查询</p>
        <h1>高考志愿院校专业分数线查询系统</h1>
      </div>
      <span class="header-badge">纯前端演示版</span>
    </div>
  </header>

  <main class="page">
    <section class="notice" aria-label="数据提示">
      <strong>重要提示：</strong>当前数据为模拟数据，仅供功能展示，不能作为真实志愿填报依据。
    </section>

    <section class="panel search-panel" aria-labelledby="searchTitle">
      <div class="section-heading">
        <h2 id="searchTitle">学校搜索</h2>
        <p>输入学校名称，可快速查看学校介绍和相关专业分数线。</p>
      </div>
      <div class="search-row">
        <label for="schoolSearch">学校名称</label>
        <input id="schoolSearch" type="search" placeholder="例如：重庆工程学院">
      </div>
    </section>

    <section class="panel" aria-labelledby="introTitle">
      <div class="section-heading">
        <h2 id="introTitle">学校介绍</h2>
        <p>展示当前数据中收录的院校基本信息。</p>
      </div>
      <div id="schoolCards" class="school-grid"></div>
    </section>

    <section class="panel" aria-labelledby="queryTitle">
      <div class="section-heading">
        <h2 id="queryTitle">专业分数线查询</h2>
        <p>优先按位次推荐；未填写位次时，按高考分数进行推荐。</p>
      </div>

      <form id="queryForm" class="query-form">
        <div class="form-field">
          <label for="provinceSelect">省份</label>
          <select id="provinceSelect" required></select>
        </div>
        <div class="form-field">
          <label for="yearSelect">年份</label>
          <select id="yearSelect" required></select>
        </div>
        <div class="form-field">
          <label for="subjectSelect">科类</label>
          <select id="subjectSelect" required>
            <option value="物理类">物理类</option>
            <option value="历史类">历史类</option>
          </select>
        </div>
        <div class="form-field">
          <label for="scoreInput">高考分数</label>
          <input id="scoreInput" type="number" min="0" max="750" placeholder="例如：465">
        </div>
        <div class="form-field">
          <label for="rankInput">位次</label>
          <input id="rankInput" type="number" min="1" placeholder="例如：68000">
        </div>
        <div class="form-actions">
          <button type="submit">查询推荐</button>
          <button type="button" id="resetBtn" class="secondary-btn">重置</button>
        </div>
      </form>

      <div class="result-head">
        <h3>推荐结果</h3>
        <span id="resultCount">尚未查询</span>
      </div>
      <div id="recommendResults" class="result-grid empty-state">
        请先选择条件并输入分数或位次。
      </div>
    </section>

    <section class="panel" aria-labelledby="listTitle">
      <div class="section-heading list-heading">
        <div>
          <h2 id="listTitle">专业分数线列表</h2>
          <p>可直接查看当前本地 JSON 文件中的全部模拟数据。</p>
        </div>
        <span id="tableCount" class="table-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>学校名称</th>
              <th>专业名称</th>
              <th>地区</th>
              <th>年份</th>
              <th>科类</th>
              <th>最低分</th>
              <th>最低位次</th>
            </tr>
          </thead>
          <tbody id="scoreTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>本网站为 GitHub Pages 静态部署示例，数据来源为本地模拟 JSON。</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
